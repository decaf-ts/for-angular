<ion-content fullscreen="true">
  <main class="graph-page">
    @if (backendAvailable() === false) {
      <div class="graph-page__backend-warning">
        <strong>Graph backend not running.</strong>
        Start it with <code>npm run start:backend</code> or run <code>npm run start:dev</code> to start both.
      </div>
    }

    <app-graph-toolbar
      [workflowId]="workflowId"
      [canRun]="backendAvailable() !== false"
      [isRunning]="isRunning()"
      (runWorkflow)="runWorkflow()"
      (saveWorkflow)="onSaveWorkflow()"
      (restoreSnapshot)="onRestoreSnapshot($event)"
    />

    <app-graph-renderer
      [graphRoot]="workflowRoot"
      [outputs]="lastResult()"
      [availableNodes]="availableNodes"
      (nodeDragEnded)="onNodeDragEnded()"
      (edgeDrawn)="onEdgeDrawn()"
      (elementsRemoved)="onElementsRemoved()"
    />

    @if (workflowOutputs().length) {
      <section class="graph-page__outputs">
        <h2>Execution outputs</h2>
        @for (output of workflowOutputs(); track output.key) {
          <article class="graph-page__output">
            <strong>{{ output.key }}</strong>
            <span>{{ output.value }}</span>
          </article>
        }
      </section>
    }
  </main>
</ion-content>
