<app-header [title]="'Crud '+ operation" />

<ion-content [fullscreen]="true">
  <main>
    <ngx-decaf-container>
      <ngx-decaf-card [title]="title">
        <ngx-decaf-model-renderer
          [model]="model"
          (listenEvent)="handleSubmit($event)"
          [globals]="globals"
        ></ngx-decaf-model-renderer>
      </ngx-decaf-card>
    </ngx-decaf-container>
  </main>
</ion-content>
