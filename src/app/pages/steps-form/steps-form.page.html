<app-header [title]="title" />

<ion-content [fullscreen]="true">
  <main>
    <ngx-decaf-container>
      <ion-card class="dcf-card-default dcf-padding-small">
        <ngx-decaf-model-renderer
          [model]="model"
          [projectable]="false"
          (listenEvent)="handleSubmit($event)"
          [globals]="globals"
        ></ngx-decaf-model-renderer>
      </ion-card>
    </ngx-decaf-container>
  </main>
</ion-content>
