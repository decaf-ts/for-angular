<ng-diagram-base-node-template [node]="node()">
  <article
    class="graph-badge"
    [class.graph-badge--selected]="isSelected()"
    [class.graph-badge--input]="node().data.role === 'input'"
    [class.graph-badge--output]="node().data.role === 'output'"
    [style.--graph-accent]="node().data.role === 'input' ? '#0f766e' : '#6d28d9'"
  >
    <span class="graph-badge__name">{{ node().data.property }}</span>

    <button
      type="button"
      class="graph-badge__btn graph-badge__btn--delete"
      title="Delete"
      (click)="deleteNode($event)"
      (mousedown)="$event.stopPropagation()"
    >&times;</button>

    <div class="graph-badge__ports graph-badge__ports--out">
      @for (port of outputPorts(); track port.property) {
        <div
          class="graph-badge__port graph-badge__port--out"
          [class.graph-badge__port--connected]="connectedPortIds().has(port.path || port.property)"
        >
          <ng-diagram-port [id]="port.path || port.property" type="source" side="right" />
        </div>
      }
    </div>
  </article>
</ng-diagram-base-node-template>
