<div class="graph-port-field" [class.graph-port-field--port-mode]="useAsPort()" [class.graph-port-field--output]="isOutput()">
  <button
    type="button"
    class="graph-port-field__ball"
    [class.graph-port-field__ball--active]="useAsPort()"
    [title]="useAsPort() ? 'Port exposed — click to use literal value' : 'Click to expose as port'"
    (click)="toggleBall()"
  ></button>

  <div class="graph-port-field__content">
    @if (!useAsPort()) {
      <span class="graph-port-field__label">{{ fieldLabel() }}</span>
      @if (isTextarea()) {
        <ion-textarea
          class="graph-port-field__textarea"
          [value]="_value()"
          (ionInput)="onValueChange($event)"
          [placeholder]="fieldLabel()"
          [rows]="2"
          [autoGrow]="true"
        ></ion-textarea>
      } @else {
        <ion-input
          class="graph-port-field__input"
          [value]="_value()"
          (ionInput)="onValueChange($event)"
          [placeholder]="fieldLabel()"
          type="text"
        ></ion-input>
      }
    } @else {
      <span class="graph-port-field__port-text">
        <strong>{{ portLabel() }}</strong>
        <small>{{ isInput() ? 'wired from upstream' : 'exposed for downstream' }}</small>
      </span>
      @if (isOutput()) {
        <button type="button" class="graph-port-field__split-btn" (click)="addOutputSplit()">+</button>
      }
    }
  </div>
</div>
