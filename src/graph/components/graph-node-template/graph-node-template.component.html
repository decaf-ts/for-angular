<ng-diagram-base-node-template [node]="node()">
  <article
    class="graph-node"
    [class.graph-node--selected]="isSelected()"
    [class.graph-node--connecting]="isConnecting()"
    [class.graph-node--pinned]="isPinned()"
    [class.graph-node--running]="statusLabel() === 'running'"
    [class.graph-node--succeeded]="statusLabel() === 'succeeded'"
    [class.graph-node--failed]="statusLabel() === 'failed'"
    [class.graph-node--cached]="statusLabel() === 'cached'"
    [style.--graph-accent]="node().data.color || '#5b21b6'"
    (dblclick)="openEditor($event)"
  >
    <div class="graph-node__icon" [class]="node().data.icon || ''">
      <span class="graph-node__icon-fallback">{{ iconFallback() }}</span>
    </div>

    <span class="graph-node__name">{{ node().data.title }}</span>

    <button
      type="button"
      class="graph-node__btn graph-node__btn--delete"
      title="Delete node"
      (click)="deleteNode($event)"
      (mousedown)="$event.stopPropagation()"
    >&times;</button>

    <button
      type="button"
      class="graph-node__btn graph-node__btn--pin"
      [class.graph-node__btn--pinned]="isPinned()"
      title="Pin node"
      (click)="pinNode($event)"
      (mousedown)="$event.stopPropagation()"
    >&#128204;</button>

    <div class="graph-node__ports graph-node__ports--in">
      @for (port of inputPorts(); track port.path || port.property) {
        <div
          class="graph-node__port graph-node__port--in"
          [class.graph-node__port--connected]="connectedPortIds().has(port.path || port.property)"
          [class.graph-node__port--default]="port.property === 'value' || port.path === 'value'"
        >
          <ng-diagram-port [id]="port.path || port.property" type="target" side="left" />
        </div>
      }
    </div>

    <div class="graph-node__ports graph-node__ports--out">
      @for (port of outputPorts(); track port.path || port.property) {
        <div
          class="graph-node__port graph-node__port--out"
          [class.graph-node__port--connected]="connectedPortIds().has(port.path || port.property)"
          [class.graph-node__port--default]="port.property === 'value' || port.path === 'value'"
        >
          <ng-diagram-port [id]="port.path || port.property" type="source" side="right" />
        </div>
      }
    </div>

    @if (connectionPorts().length) {
      <div class="graph-node__ports graph-node__ports--connection">
        @for (port of connectionPorts(); track port.path || port.property) {
          <div
            class="graph-node__port graph-node__port--connection"
            [class.graph-node__port--connected]="connectedPortIds().has(port.path || port.property)"
            [style.--connection-color]="connectionColor(port.graph?.category)"
            [title]="port.graph?.category || port.label"
          >
            <ng-diagram-port [id]="port.path || port.property" type="target" side="bottom" />
          </div>
        }
      </div>
    }
  </article>
</ng-diagram-base-node-template>
